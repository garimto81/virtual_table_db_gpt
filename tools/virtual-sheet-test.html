<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual 시트 분석 테스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .log-info { color: #60a5fa; }
        .log-success { color: #34d399; }
        .log-warning { color: #fbbf24; }
        .log-error { color: #f87171; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <!-- 헤더 -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold mb-2">🧪 Virtual 시트 분석 테스터</h1>
                <p class="text-gray-400">시간값과 Google Sheets 링크를 입력하여 Virtual 시트 매칭을 테스트하세요</p>
            </div>

            <!-- 입력 폼 -->
            <div class="bg-gray-800 rounded-lg p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4">📝 테스트 설정</h2>
                
                <div class="grid md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">타겟 시간 (Unix Timestamp)</label>
                        <input type="number" id="timestamp-input" 
                               class="w-full px-3 py-2 bg-gray-700 rounded border border-gray-600 focus:border-blue-500 focus:outline-none"
                               placeholder="1704096000 (예시)">
                        <div class="text-xs text-gray-400 mt-1">
                            현재 시간: <span id="current-timestamp" class="mono"></span>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">또는 날짜/시간 입력</label>
                        <input type="datetime-local" id="datetime-input"
                               class="w-full px-3 py-2 bg-gray-700 rounded border border-gray-600 focus:border-blue-500 focus:outline-none">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Virtual 시트 URL</label>
                    <input type="url" id="sheet-url-input" 
                           class="w-full px-3 py-2 bg-gray-700 rounded border border-gray-600 focus:border-blue-500 focus:outline-none"
                           placeholder="https://docs.google.com/spreadsheets/d/...">
                    <div class="text-xs text-gray-400 mt-1">
                        Google Sheets 링크 또는 CSV 게시 URL 입력
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">검색 범위 (분)</label>
                        <select id="search-range" class="w-full px-3 py-2 bg-gray-700 rounded border border-gray-600 focus:border-blue-500 focus:outline-none">
                            <option value="1">±1분</option>
                            <option value="3" selected>±3분</option>
                            <option value="5">±5분</option>
                            <option value="10">±10분</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">시간 컬럼</label>
                        <select id="time-column" class="w-full px-3 py-2 bg-gray-700 rounded border border-gray-600 focus:border-blue-500 focus:outline-none">
                            <option value="2" selected>C열 (Seoul 시간)</option>
                            <option value="1">B열</option>
                            <option value="0">A열</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">디버그 모드</label>
                        <label class="flex items-center">
                            <input type="checkbox" id="debug-mode" class="mr-2">
                            <span class="text-sm">상세 로그 출력</span>
                        </label>
                    </div>
                </div>

                <button id="test-btn" 
                        class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-semibold transition-colors">
                    🔍 Virtual 시트 분석 시작
                </button>
            </div>

            <!-- 결과 섹션 -->
            <div class="grid md:grid-cols-2 gap-6">
                <!-- 매칭 결과 -->
                <div class="bg-gray-800 rounded-lg p-6">
                    <h3 class="text-lg font-semibold mb-4">📊 매칭 결과</h3>
                    <div id="result-container">
                        <div class="text-gray-400 text-center py-8">
                            테스트를 실행하면 결과가 여기에 표시됩니다
                        </div>
                    </div>
                </div>

                <!-- 로그 출력 -->
                <div class="bg-gray-800 rounded-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold">📝 분석 로그</h3>
                        <button id="clear-logs" class="px-3 py-1 bg-gray-600 hover:bg-gray-500 rounded text-sm">
                            지우기
                        </button>
                    </div>
                    <div id="log-container" class="mono text-sm bg-gray-900 rounded p-4 h-64 overflow-y-auto">
                        <div class="text-gray-500">로그 출력 대기 중...</div>
                    </div>
                </div>
            </div>

            <!-- 시트 데이터 미리보기 -->
            <div class="bg-gray-800 rounded-lg p-6 mt-6" id="data-preview" style="display: none;">
                <h3 class="text-lg font-semibold mb-4">📋 시트 데이터 미리보기</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm" id="preview-table">
                        <thead>
                            <tr class="border-b border-gray-600"></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 현재 시간 표시
        function updateCurrentTime() {
            const now = Math.floor(Date.now() / 1000);
            document.getElementById('current-timestamp').textContent = now;
        }
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);

        // 날짜/시간 입력과 타임스탬프 동기화
        document.getElementById('datetime-input').addEventListener('change', function() {
            const dateTime = new Date(this.value);
            const timestamp = Math.floor(dateTime.getTime() / 1000);
            document.getElementById('timestamp-input').value = timestamp;
        });

        document.getElementById('timestamp-input').addEventListener('input', function() {
            if (this.value) {
                const date = new Date(this.value * 1000);
                const localDateTime = new Date(date.getTime() - date.getTimezoneOffset() * 60000)
                                     .toISOString().slice(0, 16);
                document.getElementById('datetime-input').value = localDateTime;
            }
        });

        // 로그 출력 함수
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('log-container');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-${type} mb-1`;
            logEntry.innerHTML = `<span class="text-gray-500">[${timestamp}]</span> ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 로그 지우기
        document.getElementById('clear-logs').addEventListener('click', function() {
            document.getElementById('log-container').innerHTML = '<div class="text-gray-500">로그 출력 대기 중...</div>';
        });

        // CSV 파싱 함수
        function parseCSV(text) {
            const rows = [];
            const lines = text.split('\n');
            
            for (const line of lines) {
                if (line.trim()) {
                    const row = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            row.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    row.push(current.trim());
                    rows.push(row);
                }
            }
            return rows;
        }

        // Virtual 시트 분석 함수
        async function analyzeVirtualSheet(targetTimestamp, sheetUrl, searchRangeMinutes, timeColumnIndex, debugMode) {
            addLog('🚀 Virtual 시트 분석 시작', 'info');
            
            try {
                // URL 변환
                let csvUrl;
                if (sheetUrl.includes('/pub?') || sheetUrl.includes('output=csv')) {
                    csvUrl = sheetUrl;
                    addLog('✅ CSV 게시 URL 사용', 'success');
                } else {
                    const sheetIdMatch = sheetUrl.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
                    if (!sheetIdMatch) {
                        throw new Error('올바른 Google Sheets URL이 아닙니다');
                    }
                    const sheetId = sheetIdMatch[1];
                    const gidMatch = sheetUrl.match(/[#&]gid=(\d+)/);
                    const gid = gidMatch ? gidMatch[1] : '0';
                    
                    csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
                    addLog(`Sheet ID: ${sheetId}, GID: ${gid}`, 'info');
                }

                addLog('🌐 CSV 데이터 가져오는 중...', 'info');
                const response = await fetch(csvUrl + '&t=' + Date.now());
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const text = await response.text();
                
                if (text.includes('<!DOCTYPE') || text.includes('<html')) {
                    throw new Error('시트가 비공개 상태이거나 접근할 수 없습니다');
                }

                const rows = parseCSV(text);
                addLog(`✅ ${rows.length}개 행 로드됨`, 'success');

                if (debugMode) {
                    showDataPreview(rows.slice(0, 10)); // 첫 10개 행 미리보기
                }

                // 타겟 시간 준비
                const targetDate = new Date(targetTimestamp * 1000);
                const targetHours = targetDate.getHours();
                const targetMinutes = targetDate.getMinutes();
                const targetTimeStr = `${targetHours.toString().padStart(2, '0')}:${targetMinutes.toString().padStart(2, '0')}`;
                
                addLog(`🎯 찾는 시간: ${targetTimeStr} (타임스탬프: ${targetTimestamp})`, 'info');
                addLog(`📍 검색 컬럼: ${['A', 'B', 'C'][timeColumnIndex]}열`, 'info');
                addLog(`⏱️ 검색 범위: ±${searchRangeMinutes}분`, 'info');

                // 매칭 로직
                let closestRow = null;
                let minDiff = Infinity;
                let matchedRowIndex = -1;
                let checkedCount = 0;
                const maxDiffSeconds = searchRangeMinutes * 60;

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    const timeCell = row[timeColumnIndex];
                    
                    if (!timeCell) continue;
                    
                    checkedCount++;
                    
                    // 시간 파싱 (HH:MM 또는 HH:MM:SS 형식)
                    const timeMatch = timeCell.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
                    if (!timeMatch) continue;
                    
                    const cellHours = parseInt(timeMatch[1]);
                    const cellMinutes = parseInt(timeMatch[2]);
                    
                    // 같은 날 기준으로 비교 (시간과 분만)
                    const cellTotalMinutes = cellHours * 60 + cellMinutes;
                    const targetTotalMinutes = targetHours * 60 + targetMinutes;
                    
                    let diffMinutes = Math.abs(cellTotalMinutes - targetTotalMinutes);
                    
                    // 자정을 넘나드는 경우 고려
                    const altDiff = Math.min(
                        Math.abs(cellTotalMinutes - targetTotalMinutes + 1440), // +24시간
                        Math.abs(cellTotalMinutes - targetTotalMinutes - 1440)  // -24시간
                    );
                    diffMinutes = Math.min(diffMinutes, altDiff);
                    
                    const diffSeconds = diffMinutes * 60;
                    
                    if (debugMode && diffSeconds <= maxDiffSeconds) {
                        addLog(`🔍 후보: 행 ${i + 1}, 시간 ${timeCell}, 차이 ${Math.floor(diffSeconds / 60)}분 ${diffSeconds % 60}초`, 'info');
                    }
                    
                    if (diffSeconds < minDiff && diffSeconds <= maxDiffSeconds) {
                        minDiff = diffSeconds;
                        closestRow = row;
                        matchedRowIndex = i + 1;
                    }
                }

                addLog(`🔍 총 ${checkedCount}개 셀 검색 완료`, 'info');

                // 결과 출력
                if (closestRow) {
                    const diffMinutes = Math.floor(minDiff / 60);
                    const diffSeconds = minDiff % 60;
                    
                    let timeDiffStr = '';
                    if (minDiff === 0) {
                        timeDiffStr = '완벽 일치';
                        addLog(`🎉 완벽 매칭! 행 ${matchedRowIndex}`, 'success');
                    } else {
                        if (diffMinutes > 0) {
                            timeDiffStr = `${diffMinutes}분 ${diffSeconds}초`;
                        } else {
                            timeDiffStr = `${diffSeconds}초`;
                        }
                        addLog(`✅ 매칭 완료: 행 ${matchedRowIndex} (${timeDiffStr} 차이)`, 'success');
                    }

                    displayResult({
                        success: true,
                        rowIndex: matchedRowIndex,
                        matchedTime: closestRow[timeColumnIndex],
                        targetTime: targetTimeStr,
                        timeDiff: minDiff,
                        timeDiffStr: timeDiffStr,
                        rowData: closestRow
                    });
                } else {
                    addLog(`❌ ${searchRangeMinutes}분 범위 내에서 매칭되는 행을 찾을 수 없음`, 'error');
                    displayResult({
                        success: false,
                        message: `검색 범위 ±${searchRangeMinutes}분 내에서 매칭되는 행을 찾을 수 없습니다.`,
                        checkedCount: checkedCount
                    });
                }

            } catch (error) {
                addLog(`❌ 오류 발생: ${error.message}`, 'error');
                displayResult({
                    success: false,
                    error: error.message
                });
            }
        }

        // 결과 표시 함수
        function displayResult(result) {
            const container = document.getElementById('result-container');
            
            if (result.success) {
                container.innerHTML = `
                    <div class="space-y-3">
                        <div class="flex items-center justify-between p-3 bg-green-900/30 border border-green-500 rounded">
                            <span class="font-semibold text-green-400">✅ 매칭 성공</span>
                            <span class="text-green-300">행 ${result.rowIndex}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 text-sm">
                            <div>
                                <div class="text-gray-400">타겟 시간</div>
                                <div class="font-mono text-blue-300">${result.targetTime}</div>
                            </div>
                            <div>
                                <div class="text-gray-400">매칭된 시간</div>
                                <div class="font-mono text-green-300">${result.matchedTime}</div>
                            </div>
                            <div>
                                <div class="text-gray-400">시간 차이</div>
                                <div class="font-mono text-yellow-300">${result.timeDiffStr}</div>
                            </div>
                            <div>
                                <div class="text-gray-400">행 번호</div>
                                <div class="font-mono text-purple-300">${result.rowIndex}</div>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <div class="text-gray-400 text-sm mb-2">매칭된 행 데이터:</div>
                            <div class="bg-gray-900 rounded p-3 font-mono text-xs overflow-x-auto">
                                ${result.rowData.slice(0, 5).map((cell, i) => `[${String.fromCharCode(65 + i)}] ${cell || '(빈값)'}`).join('<br>')}
                                ${result.rowData.length > 5 ? `<br><span class="text-gray-500">... 총 ${result.rowData.length}개 컬럼</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="space-y-3">
                        <div class="flex items-center justify-center p-4 bg-red-900/30 border border-red-500 rounded">
                            <span class="font-semibold text-red-400">❌ 매칭 실패</span>
                        </div>
                        
                        <div class="text-center text-gray-300">
                            ${result.error || result.message}
                        </div>
                        
                        ${result.checkedCount ? `
                            <div class="text-center text-sm text-gray-400">
                                총 ${result.checkedCount}개 셀 검색됨
                            </div>
                        ` : ''}
                    </div>
                `;
            }
        }

        // 데이터 미리보기 표시
        function showDataPreview(rows) {
            const preview = document.getElementById('data-preview');
            const table = document.getElementById('preview-table');
            
            if (rows.length === 0) return;
            
            // 헤더 생성
            const thead = table.querySelector('thead tr');
            thead.innerHTML = '';
            for (let i = 0; i < Math.min(rows[0].length, 10); i++) {
                thead.innerHTML += `<th class="px-2 py-1 text-left">${String.fromCharCode(65 + i)}열</th>`;
            }
            
            // 데이터 행 생성
            const tbody = table.querySelector('tbody');
            tbody.innerHTML = '';
            for (let i = 0; i < Math.min(rows.length, 10); i++) {
                const row = rows[i];
                let html = '<tr class="border-b border-gray-700">';
                for (let j = 0; j < Math.min(row.length, 10); j++) {
                    const cellValue = row[j] || '';
                    html += `<td class="px-2 py-1 text-xs mono truncate max-w-32" title="${cellValue}">${cellValue}</td>`;
                }
                html += '</tr>';
                tbody.innerHTML += html;
            }
            
            preview.style.display = 'block';
        }

        // 테스트 실행 버튼
        document.getElementById('test-btn').addEventListener('click', async function() {
            const timestamp = parseInt(document.getElementById('timestamp-input').value);
            const sheetUrl = document.getElementById('sheet-url-input').value;
            const searchRange = parseInt(document.getElementById('search-range').value);
            const timeColumn = parseInt(document.getElementById('time-column').value);
            const debugMode = document.getElementById('debug-mode').checked;
            
            if (!timestamp || !sheetUrl) {
                addLog('❌ 타임스탬프와 시트 URL을 모두 입력해주세요', 'error');
                return;
            }
            
            // 버튼 비활성화
            this.disabled = true;
            this.textContent = '🔄 분석 중...';
            
            // 이전 결과 초기화
            document.getElementById('result-container').innerHTML = '<div class="text-gray-400 text-center py-8">분석 중...</div>';
            document.getElementById('data-preview').style.display = 'none';
            
            try {
                await analyzeVirtualSheet(timestamp, sheetUrl, searchRange, timeColumn, debugMode);
            } finally {
                // 버튼 복원
                this.disabled = false;
                this.textContent = '🔍 Virtual 시트 분석 시작';
            }
        });

        // 초기 로그
        addLog('🧪 Virtual 시트 분석 테스터 준비 완료', 'success');
    </script>
</body>
</html>
